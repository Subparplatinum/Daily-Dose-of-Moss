<style> 
  body { margin: 0; }
  
  #loading-spinner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 999;
  }
  
  .spinner {
    border: 4px solid rgba(255, 255, 255, 0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
  }
  
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  
  #loading-spinner.hidden {
    display: none;
  }
</style>
<title>3D Moss Viewer</title>
<script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
    }
  }
</script>
<script type="module">
  import * as THREE from "three";
  import { SplatMesh } from "@sparkjsdev/spark";

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  
  // Create loading spinner
  const spinnerDiv = document.createElement('div');
  spinnerDiv.id = 'loading-spinner';
  spinnerDiv.innerHTML = '<div class="spinner"></div>';
  document.body.appendChild(spinnerDiv);

  const moss = new SplatMesh({url: "./Moss_SH1.ply", onLoad: mossLoaded()});
  const mossArgs = new SplatMeshAr
  moss.quaternion.set(1, 0, 0, 0);
  moss.position.set(0, 0, -3);

  // Rotate 45 degrees towards the camera (around X-axis)
  moss.rotation.x =  (2*Math.PI)-(Math.PI / 4); // 45 degrees in radians
  scene.add(moss);
  
  // Hide spinner once mesh is initialized
  function mossLoaded(){
    spinnerDiv.classList.add('hidden');
  }

  renderer.setAnimationLoop(function animate(time) {
    renderer.render(scene, camera);
    moss.rotation.y += 0.01;
  });
</script>
